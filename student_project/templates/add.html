<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h3>Register New Student</h3>
    {% with messages = get_flashed_messages() %}{% if messages %}
        <div class="alert alert-danger">{{ messages[0] }}</div>
    {% endif %}{% endwith %}
    <form method="POST" class="mt-4" style="max-width: 500px;">
        <input type="text" name="id" class="form-control mb-2" placeholder="6-Digit ID" required>
        <input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>
        <select name="branch" class="form-select mb-2">
            <option>AIML</option><option>IT</option><option>Mechanical</option><option>Electrical</option><option>Computer Science</option>
        </select>
        <div class="row g-2 mb-3">
            <div class="col"><input type="number" step="0.1" name="y1" class="form-control" placeholder="Y1 CGPA"></div>
            <div class="col"><input type="number" step="0.1" name="y2" class="form-control" placeholder="Y2 (Opt)"></div>
            <div class="col"><input type="number" step="0.1" name="y3" class="form-control" placeholder="Y3 (Opt)"></div>
        </div>
        <button type="submit" class="btn btn-success w-100">Save Data</button>
        <a href="/" class="btn btn-link w-100 mt-2">Cancel</a>
    </form>
</body>
</html>

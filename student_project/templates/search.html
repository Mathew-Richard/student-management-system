<!DOCTYPE html>
<html>
<head>
    <title>Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h3>Find Student</h3>
    <form method="POST" class="input-group mb-4" style="max-width: 400px;">
        <input type="text" name="search_id" class="form-control" placeholder="Enter ID">
        <button class="btn btn-primary">Search</button>
    </form>
    {% if result %}
        <div class="alert alert-info">
            <b>Found:</b> {{ result.name }} ({{ result.branch }})<br>
            <b>Average:</b> {{ result.avg }} | <b>Status:</b> {{ result.result }}
        </div>
    {% endif %}
    <a href="/" class="btn btn-secondary">Back</a>
</body>
</html>
